name: Build
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            script: build:win
            ext: exe blockmap yml
          - os: macos-latest
            script: build:mac
            ext: dmg blockmap yml
          - os: macos-latest
            script: build:mac-universal
            ext: dmg blockmap yml
          - os: ubuntu-latest
            script: build:lin
            ext: AppImage blockmap yml
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build
        run: npm run ${{ matrix.script }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false 
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: launcher-${{ matrix.os }}
          path: release/*.${{ matrix.ext }}
